<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberQuest Portal - Dev Staging</title>
  <style>
    body {
      background-color: #0b0f19;
      color: #38bdf8;
      font-family: 'Courier New', Courier, monospace;
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .panel {
      border: 2px solid #0284c7;
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 20px rgba(2, 132, 199, 0.4);
      padding: 30px;
      border-radius: 8px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    h1 {
      color: #f43f5e;
      font-size: 24px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(244, 63, 94, 0.5);
    }
    input {
      width: 90%;
      padding: 10px;
      background: #0f172a;
      border: 1px solid #38bdf8;
      color: #fff;
      margin: 10px 0;
      border-radius: 4px;
    }
    button {
      padding: 10px 20px;
      background: #0284c7;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      width: 95%;
      margin-top: 10px;
    }
    button:hover {
      background: #0369a1;
    }
    .status {
      margin-top: 20px;
      color: #e2e8f0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!--
    DEVELOPER NOTE:
    TODO: Add proper session cookies.
    TODO: Remove temporary debug credentials.
    FIXME: The flag for Challenge 2 is here: cyberquest{c0mm3nts_4r3_n0t_hidd3n}
  -->
  <div class="panel">
    <h1>SECURE ADMIN ACCESS</h1>
    <p>Authentication Required</p>
    <input type="text" placeholder="Username (Disabled in staging)">
    <input type="password" placeholder="Password (Disabled in staging)">
    <button onclick="alert('Access Denied: Staging console is read-only.')">LOGIN</button>
    <div class="status">System Status: <span style="color: #22c55e;">ONLINE (STAGING V1.0.4)</span></div>
  </div>
</body>
</html>
