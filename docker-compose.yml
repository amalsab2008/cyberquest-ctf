version: '3.8'

services:
  # Database Service
  postgres:
    image: postgres:15-alpine
    container_name: cyberquest-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_1337
      POSTGRES_DB: cyberquest
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # Backend Server Service
  server:
    build: ./server
    container_name: cyberquest-server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: cyberquest_jwt_secret_token_1337
      DATABASE_URL: postgres://postgres:postgres_secure_1337@postgres:5432/cyberquest
    depends_on:
      - postgres
    restart: always

  # Frontend Nginx Service
  client:
    build: ./client
    container_name: cyberquest-client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: always

volumes:
  pgdata:
